# 恶意爬虫/扫描器 User-Agent 黑名单
map $http_user_agent $bad_bot {
    default 0;
    "~*AhrefsBot"        1;
    "~*SemrushBot"       1;
    "~*MJ12bot"          1;
    "~*DotBot"           1;
    "~*BLEXBot"          1;
    "~*Barkrowler"       1;
    "~*PetalBot"         1;
    "~*YisouSpider"      1;
    "~*Bytespider"       1;
    "~*ZoominfoBot"      1;
    "~*ezooms"           1;
    "~*scrapy"           1;
    "~*sqlmap"           1;
    "~*nmap"             1;
    "~*nikto"            1;
    "~*masscan"          1;
    "~*zgrab"            1;
    "~*gobuster"         1;
    "~*dirbuster"        1;
    "~*wfuzz"            1;
    "~*HeadlessChrome"   1;
}

server {
    listen 80;
    server_name _;
    server_tokens off;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /home/ubuntu/zyuit-website;
    index index.html;

    # 恶意爬虫直接拒绝
    if ($bad_bot) { return 403; }

    # 常见漏洞扫描路径拒绝
    location ~* ^/(wp-admin|wp-login|wp-content|xmlrpc\.php|\.env|\.git|\.svn|\.htaccess|\.htpasswd|config\.php|admin\.php|shell\.php|console|owa|ecp|remote|soap) {
        return 404;
    }

    # 防止 .git 和 .svn 等目录信息泄露
    location ~ /\. { deny all; return 404; }

    # leads.json / server.js 等敏感文件禁止直接访问
    location = /leads.json   { return 404; }
    location = /server.js    { return 404; }
    location = /package.json { return 404; }
    location = /package-lock.json { return 404; }

    # API 代理 (限流)
    location /api/ {
        limit_req zone=api burst=5 nodelay;
        limit_conn perip 5;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源 — 30 天强缓存
    location ~* \.(jpg|jpeg|png|gif|webp|ico|svg|css|js|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        limit_req zone=static burst=50 nodelay;
        try_files $uri =404;
    }

    # HTML 短缓存
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate, proxy-revalidate";
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        try_files $uri =404;
    }

    # 禁用不需要的 HTTP 方法
    if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE)$) {
        return 405;
    }

    location / {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri $uri/ /index.html;
    }

    location /health {
        return 200 OK;
        add_header Content-Type text/plain;
    }
}
